kind = "web"
previewPath = "/"
title = "AI Ghostwriter"
version = "1.0.0"
id = "artifacts/ghostwriter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25796

[services.development]
run = "pnpm --filter @workspace/ghostwriter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ghostwriter", "run", "build" ]
publicDir = "artifacts/ghostwriter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25796"
BASE_PATH = "/"
